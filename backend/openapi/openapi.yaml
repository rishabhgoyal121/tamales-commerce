openapi: 3.0.3
info:
  title: Tamales Commerce API
  version: 0.1.0
  description: Initial API contract for Tamales Commerce backend.
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  services:
                    type: object
                    properties:
                      api:
                        type: string
                        example: up
                      db:
                        type: string
                        example: up
  /products:
    get:
      summary: List products
      responses:
        '200':
          description: Product list response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        price:
                          type: number
