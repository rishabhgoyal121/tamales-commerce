openapi: 3.0.3
info:
  title: Tamales Commerce API
  version: 0.2.0
  description: API contract for Tamales Commerce backend.
servers:
  - url: http://localhost:4000/api/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                email:
                  type: string
                role:
                  type: string
                  enum: [CUSTOMER, ADMIN]
            accessToken:
              type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            status:
              type: integer
            path:
              type: string
            requestId:
              type: string
            timestamp:
              type: string
              format: date-time
            details:
              type: array
              items:
                type: object
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health snapshot
  /products:
    get:
      summary: List products
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search text (title contains).
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
          description: Minimum price in cents.
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
          description: Maximum price in cents.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - createdAt_desc
              - createdAt_asc
              - price_asc
              - price_desc
              - title_asc
            default: createdAt_desc
      responses:
        '200':
          description: Product list response
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: User logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
  /auth/refresh:
    post:
      summary: Rotate refresh token and issue new access token
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or missing refresh cookie
  /auth/logout:
    post:
      summary: Logout user and revoke refresh token
      responses:
        '204':
          description: Logged out
  /auth/me:
    get:
      summary: Get current authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
        '401':
          description: Unauthorized
  /auth/admin-check:
    get:
      summary: Admin role access check endpoint
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin access granted
        '403':
          description: Forbidden
  /orders:
    get:
      summary: List current customer orders
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [CREATED, CONFIRMED, PACKED, SHIPPED, DELIVERED, CANCELLED]
        - in: query
          name: paymentStatus
          schema:
            type: string
            enum: [PENDING, AUTHORIZED, FAILED, REFUNDED]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - createdAt_desc
              - createdAt_asc
              - total_desc
              - total_asc
              - status_asc
            default: createdAt_desc
      responses:
        '200':
          description: Customer order list
        '401':
          description: Unauthorized
  /orders/{orderId}:
    get:
      summary: Get current customer order detail
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer order detail
        '401':
          description: Unauthorized
        '404':
          description: Order not found for current user
  /admin/orders:
    get:
      summary: List orders for admins
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [CREATED, CONFIRMED, PACKED, SHIPPED, DELIVERED, CANCELLED]
        - in: query
          name: paymentStatus
          schema:
            type: string
            enum: [PENDING, AUTHORIZED, FAILED, REFUNDED]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 12
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - createdAt_desc
              - createdAt_asc
              - total_desc
              - total_asc
              - status_asc
            default: createdAt_desc
      responses:
        '200':
          description: Admin order list
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /admin/orders/{orderId}/status:
    patch:
      summary: Update order status as admin
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [CREATED, CONFIRMED, PACKED, SHIPPED, DELIVERED, CANCELLED]
                note:
                  type: string
                  maxLength: 280
      responses:
        '200':
          description: Order status updated with transition audit entry
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Order not found
        '422':
          description: Invalid payload or transition
  /admin/orders/{orderId}/status-transitions:
    get:
      summary: List admin order status transition history
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order status transition history
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Order not found
  /cart:
    get:
      summary: Get current user cart
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cart payload
    delete:
      summary: Remove all items from current user cart
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cleared cart payload
  /cart/items:
    post:
      summary: Add item to cart
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Updated cart payload
  /cart/items/{itemId}:
    patch:
      summary: Update cart item quantity
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Updated cart payload
    delete:
      summary: Remove item from cart
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated cart payload
  /checkout/preview:
    post:
      summary: Preview checkout totals without placing order
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                couponCode:
                  type: string
      responses:
        '200':
          description: Checkout pricing preview
